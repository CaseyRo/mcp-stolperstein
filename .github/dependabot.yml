version: 2

# uv ecosystem updates both pyproject.toml AND uv.lock in a single PR.
# sentence-transformers + sqlite-vec are the heavy ML bits — own group,
# because minor bumps can change embedding output and break KU retrieval.

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      ml-embeddings:
        patterns:
          - "sentence-transformers"
          - "sqlite-vec"
      python-runtime:
        patterns:
          - "fastmcp"
          - "pydantic"
          - "pydantic-settings"
          - "httpx"
      dev-tools:
        dependency-type: "development"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
