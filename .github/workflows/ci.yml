name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# NOTE: this workflow runs on every PR/push but does NOT yet gate the Komodo
# auto-deploy — that requires branch protection making this a required check
# (and blocking direct pushes to main). See the audit report follow-ups.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check src tests plugin
      - run: uv run mypy src
      - run: uv run pytest
