name: Security Audit

on:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      # Audit the LOCKED project dependencies, not pip-audit's own ephemeral
      # venv (the bare `uvx pip-audit` bug: it saw requests/rich, never
      # fastmcp/torch). torch's local +cpu tag isn't on PyPI, so strip it —
      # 2.12.1+cpu and 2.12.1 share advisories.
      - name: Export locked requirements
        run: |
          uv export --format requirements-txt --no-emit-project -o requirements.txt
          sed -i 's/+cpu//' requirements.txt

      - name: Security audit (pip-audit)
        run: uvx pip-audit==2.9.0 --no-deps --disable-pip -r requirements.txt
