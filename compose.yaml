services:
  mcp-stolperstein:
    build: .
    restart: unless-stopped
    # Runtime hardening: non-root already (USER mcp in the image); block
    # privilege escalation and drop all Linux caps (a non-root Python HTTP
    # server on :8716 needs none).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8716:8716"
    environment:
      - TRANSPORT=http
      - HOST=0.0.0.0
      - PORT=8716
      - CQ_LOCAL_DB_PATH=/data/stolperstein.db
      - MCP_STOLPERSTEIN_API_KEY=${MCP_STOLPERSTEIN_API_KEY:-}
      - MCP_STOLPERSTEIN_PUBLIC_URL=${MCP_STOLPERSTEIN_PUBLIC_URL:-https://mcp-stolperstein.cdit-dev.de}
      # Recovery path: if /data/stolperstein.key is ever lost, set this (base64
      # of the 32-byte key) in Komodo env and it wins over the file. Defaults
      # empty -> normal boot loads the key from the volume.
      - MCP_STOLPERSTEIN_SIGNING_KEY=${MCP_STOLPERSTEIN_SIGNING_KEY:-}
      - CF_ACCESS_TEAM=${CF_ACCESS_TEAM:-cdit-dev}
      - CF_ACCESS_CLIENT_ID=${CF_ACCESS_CLIENT_ID}
      - CF_ACCESS_CLIENT_SECRET=${CF_ACCESS_CLIENT_SECRET}
      - CQ_EMBEDDING_MODEL=${CQ_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - CQ_EMBEDDING_API_URL=${CQ_EMBEDDING_API_URL:-}
      # CQ_TEAM_* and CQ_SIYUAN_* removed: nothing in the codebase reads them
      # (no sync/ module, not defined in Settings), so passing them only injected
      # live tokens into the container for no consumer. Re-add alongside the code
      # when team / SiYuan sync is actually implemented.
      - CQ_LLM_API_URL=${CQ_LLM_API_URL:-}
      - CQ_LLM_API_KEY=${CQ_LLM_API_KEY:-}
      - CQ_LLM_MODEL=${CQ_LLM_MODEL:-gpt-4o-mini}
      - FASTMCP_HOME=/data/fastmcp
    volumes:
      - stolperstein-data:/data
      - fastmcp-data:/data/fastmcp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  stolperstein-data:
  fastmcp-data:
